<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Мій профіль | BirdBoard</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <!-- Хедер можна вставити тут як на головній сторінці -->
  <header class="header">
    <div class="container">
      <div class="header__wrapper">
        <img src="../icons/BirdBoard.svg" alt="logo">
        <div class="header__content">
          <nav>
            <ul class="header__nav">
              <li><a href="../index.html">Головна</a></li>
              <li><a href="#!">Оголошення</a></li>
            </ul>
          </nav>
          <div>
            <ul class="header__translation">
              <li>Укр</li>
              <li>Eng</li>
            </ul>
          </div>
          <div class="header__btn">
            <a href="#!">Додати оголошення</a>
          </div>
          <div class="header__account">
            <a href="#!" id="accountBtn">Ваш профіль</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main>

    <section class="profile-section">
        <h2>Мій профіль</h2>
        
        <!-- Блок аватарки -->
        <div class="avatar-section">
            <div class="avatar-display">
                <div id="avatarContainer" class="avatar-container"></div>
            </div>
            <div class="avatar-controls">
                <label for="avatarUpload" class="upload-btn">
                    📷 Завантажити аватарку
                </label>
                <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
            </div>
        </div>
        
        <div class="profile-data">
            <p><span class="label">Ім'я:</span> <span class="value" id="profileName"></span></p>
            <p><span class="label">Прізвище:</span> <span class="value" id="profileSurname"></span></p>
            <p><span class="label">По батькові:</span> <span class="value" id="profilePatronymic"></span></p>
            <p><span class="label">Телефон:</span> <span class="value" id="profilePhone"></span></p>
            <p><span class="label">Email:</span> <span class="value" id="profileEmail"></span></p>
            <p><span class="label">Логін:</span> <span class="value" id="profileLogin"></span></p>
        </div>
        
        <div class="profile-actions">
            <button id="editProfileBtn">Редагувати</button>
            <button id="saveProfileBtn" style="display:none;">Зберегти зміни</button>
            <button id="logoutBtn">Вийти з акаунту</button>
        </div>
    </section>
  </main>

  <script src="../js/profile.js"></script>
</body>
</html>
